server {
    listen 80;
    server_name _;

    # API -> Backend
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Prefect API — rewrite /prefect/api/ -> /api/ on the upstream
    location /prefect/api/ {
        resolver 127.0.0.11 valid=10s;
        set $prefect_upstream http://prefect-server:4200;
        rewrite ^/prefect/api(/.*)$ /api$1 break;
        proxy_pass $prefect_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prefect UI — pass /prefect/* as-is (SPA + static assets)
    location /prefect/ {
        resolver 127.0.0.11 valid=10s;
        set $prefect_upstream http://prefect-server:4200;
        proxy_pass $prefect_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else -> Next.js
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HTTPS — uncomment when domain is ready
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
}
