services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when SSL is ready
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - nextjs
      - api
    networks:
      - public
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-app,prefect}
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal

  prefect-server:
    build:
      context: ./infra/prefect
      dockerfile: Dockerfile
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prefect
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_UI_SERVE_BASE: /prefect
      PREFECT_UI_API_URL: /prefect/api
      PREFECT_SERVER_API_AUTH_STRING: ${PREFECT_AUTH_STRING}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  prefect-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: prefect worker start --pool default-agent-pool
    env_file:
      - .env
    environment:
      PREFECT_API_AUTH_STRING: ${PREFECT_AUTH_STRING}
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn src.apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  public:
  internal:
    internal: true
